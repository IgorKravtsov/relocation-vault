  topic: armenia_cost_living_national_screen
  value: "Livingcost's Armenia national page reports about USD 1,070/month for one person with rent and USD 2,543/month for a family-of-four proxy, with rent/utilities around USD 546/month for one person and USD 924/month for a family proxy."
