- id: claim-armenia-020
  topic: armenia_partner_student_one_income_screen
  value: "For the student partner, Armenia should be screened on a marriage/spouse or independent-status baseline: MFA lists spouse/parent/child of a temporary resident, but no captured evidence supports unmarried-partner sponsorship or Ukrainian remote university study as its own Armenian residence ground; one-income fit is service-rich but tight in Yerevan and cheaper but lower-service in Gyumri/Vanadzor."
  source: src-275
  date_verified: 2026-06-25
  confidence: medium
  tags: [partner, spouse, student, one-income, yerevan, gyumri, vanadzor]
  notes: "Cost/rent support comes from src-601, src-602, and src-603; conservative tax-net context comes from src-491."
