- id: claim-uruguay-002
  topic: permanent_residence_foreign_employee_evidence
  value: "Permanent legal residence means-of-life evidence includes a foreign legal-entity employee category requiring a notarial certificate covering the company, income, payment method, remote activity from Uruguay, and whether labour/social-security registration applies."
