- id: claim-paraguay-008
  topic: pit_personal_services_rates
  value: "Paraguay personal-service income PIT uses progressive rates on net income: 8% up to PYG 50m, 9% from PYG 50,000,001 to PYG 150m, and 10% from PYG 150,000,001 upward; gross personal-service income not exceeding PYG 80m is not required to pay PIT."
  source: src-437
  date_verified: 2026-06-10
  confidence: medium-high
  tags: [tax, pit, personal-services, paraguay]
