- id: claim-spain-006
  topic: autonomo_registration_route
  value: "Register professional activity through AEAT Form 036; RETA applies to habitual, personal, direct lucrative self-employment without employment contract."
  source: src-280
  date_verified: 2026-06-06
  confidence: high
  tags: [spain, taxes, autonomo, registration, reta]
  notes: "Form 036 is the census declaration for entrepreneurs/professionals; Social Security source anchors the RETA scope definition. Cross-source support: src-284."

- id: claim-spain-007
  topic: pit_general_income_progressive_scale_planning
  value: "2025 planning scale: 19% to EUR 12,450; 24% next EUR 7,750; 30% next EUR 15,000; 37% next EUR 24,800; 45% to EUR 300,000; 47% above."
  source: src-281
  date_verified: 2026-06-06
  confidence: medium-high
  tags: [spain, taxes, pit, irpf, rates]
  notes: "PwC warns that final general-income rates differ by autonomous community; use this as a first-pass planning proxy, not final filing advice."

- id: claim-spain-008
  topic: ordinary_autonomo_tax_net_example
  value: "At USD 3,000/month gross converted at EUR 0.860529/USD, simplified ordinary autonomo planning gives about EUR 1,800/month net after EUR 427/month RETA and about EUR 355/month IRPF."
  source: src-281
  date_verified: 2026-06-06
  confidence: medium
  tags: [spain, taxes, autonomo, budget, worked-example]
  notes: "Calculation uses src-281 PIT planning scale, src-285 RETA quota table, and src-286 FX. Regional PIT, business expenses, first-year flat quota, and VAT/invoicing costs are excluded."

- id: claim-spain-009
  topic: tax_residence_baseline
  value: "More than 183 days in Spain, or main economic/personal centre in Spain, generally creates full-year Spanish tax residence; Spain has no part-year resident concept."
  source: src-282
  date_verified: 2026-06-06
  confidence: medium-high
  tags: [spain, taxes, residence, tax-residence]
  notes: "This drives the conservative baseline that a long-stay DN/autonomo file should model Spanish resident taxation unless a treaty/adviser confirms otherwise."

- id: claim-spain-010
  topic: marriage_joint_tax_baseline
  value: "Individual taxation is the basic method; family units may elect joint taxation, generally requiring non-legally separated spouses and minor/disabled dependent children."
  source: src-283
  date_verified: 2026-06-06
  confidence: medium-high
  tags: [spain, taxes, marriage, joint-filing]
  notes: "Unmarried partners should not be assumed to form the same Spanish family unit for joint taxation."

- id: claim-spain-011
  topic: reta_2026_quota_income_bracket
  value: "For 2026 RETA planning, the EUR 2,330-2,760/month net-return bracket has a EUR 1,356.21 minimum base and about EUR 427/month minimum quota; EUR 2,760-3,190/month has about EUR 452/month minimum quota."
