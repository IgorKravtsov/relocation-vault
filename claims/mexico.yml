- id: claim-mexico-010
  topic: filing_and_marriage_tax_mechanics
  value: "PwC says Mexico's tax year is the calendar year, annual resident returns are generally due by 30 April of the following year, joint returns are not allowed, and personal service income should be declared by the spouse earning it."
