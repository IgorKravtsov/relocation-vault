- id: claim-mexico-007
  topic: tax_residence_and_worldwide_income
  value: "PwC says a person is tax-resident in Mexico when they establish a home in Mexico, with centre-of-vital-interests tie-breaker if they also have a home elsewhere; resident individuals are taxed on worldwide income."
  source: src-450
  date_verified: 2026-06-10
  confidence: medium-high
  tags: [tax-residence, worldwide-income, mexico]
  notes: "This supports using a resident-worldwide-income model if the couple settles in Mexico rather than a visitor-only model. Worldwide income scope is also stated in src-449."

- id: claim-mexico-008
  topic: resident_pit_rates_2026
  value: "PwC's 2026 resident individual PIT table is progressive up to 35%; USD 36,000/year at the run-091 FX snapshot falls in the MXN 424,353.98-668,840.14 bracket, with MXN 67,981.92 basic tax plus 23.52% on the excess."
  source: src-449
  date_verified: 2026-06-10
  confidence: medium-high
  tags: [tax, pit, rates, worked-example]
