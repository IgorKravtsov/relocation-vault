- id: claim-serbia-020
  topic: healthcare_insured_person_rights
  value: "Serbia's RFZO says insured persons exercise healthcare rights in contracted healthcare institutions based on a certified health-insurance document/card/certificate; compulsory health insurance covers illness/injury outside work and work injury/occupational disease."
