- id: claim-north-macedonia-011
  topic: tax_screening_usd3000
  value: "At the run-084 FX snapshot, USD 3,000/month equals about MKD 158,949; a PIT-only 10% model leaves about MKD 143,055 / USD 2,700, while a conservative gross-base PIT plus 28% contribution stress test leaves about MKD 98,549 / USD 1,860."
  source: src-417
  date_verified: 2026-06-09
  confidence: medium
  tags: [tax, worked-example, fx]
