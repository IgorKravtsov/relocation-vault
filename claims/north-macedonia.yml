- id: claim-north-macedonia-007
  topic: tax_residence_scope
  value: "PwC states that Macedonian tax residents are taxed on worldwide income; tax residence can arise from permanent or temporary residence in the country, including 183 days or more in any 12-month period."
  source: src-413
  date_verified: 2026-06-09
  confidence: medium-high
  tags: [tax-residence, worldwide-income, 183-days]
  notes: "Residence mechanics are cross-supported by src-414; treaty tie-breakers require adviser review if relevant."

- id: claim-north-macedonia-008
  topic: personal_income_tax_rate
  value: "As of the current PwC review, North Macedonia applies a 10% flat PIT rate to work, self-employment, royalties/IP, rent, capital, capital gains, insurance, and other taxable income not categorised separately."
  source: src-413
  date_verified: 2026-06-09
  confidence: medium-high
  tags: [tax, pit, self-employment]
  notes: "Games of chance and unexplained-origin income have separate rates and are not relevant to the IT screening model."

- id: claim-north-macedonia-009
  topic: social_contribution_rates
  value: "PwC lists employee-style compulsory social contribution rates of 18.8% pension/disability, 7.5% health, 1.2% employment, and 0.5% additional health, or 28.0% combined, with minimum and maximum salary bases."
  source: src-415
  date_verified: 2026-06-09
  confidence: medium-high
  tags: [social-security, healthcare, contributions]
  notes: "Exact self-employed / company-manager base and ordering remain unverified and are tracked in vq-107."

- id: claim-north-macedonia-010
  topic: vat_threshold_and_rate
  value: "PwC lists an 18% standard VAT rate and a mandatory VAT registration threshold when total annual turnover exceeds MKD 2 million or projected turnover at business start will exceed that amount."
  source: src-416
  date_verified: 2026-06-09
  confidence: medium-high
  tags: [vat, threshold, foreign-client-fit]
