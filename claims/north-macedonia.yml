- id: claim-north-macedonia-001
  topic: eu_schengen_residence_short_entry
  value: "North Macedonia MFA states that third-country nationals with temporary or permanent residence in an EU Member State or Schengen signatory may stay up to 15 days per entry, with total stay not exceeding 90 days in any 180-day period."
  source: src-205
  date_verified: 2026-06-02
  confidence: high
  tags: [entry, polish-karta-pobytu, short-stay]
  notes: "This is a short-entry bridge only; it does not replace a North Macedonian residence permit."

