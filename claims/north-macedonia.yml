- id: claim-north-macedonia-005
  topic: climate_clearer_sky_day_equivalents
  value: "WeatherSpark monthly clearer-sky percentages convert to approximately 228 clearer-sky day-equivalents for Skopje, 219 for Ohrid, and 224 for Bitola."
