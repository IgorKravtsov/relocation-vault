- id: claim-bosnia-herzegovina-007
  topic: tax_residence_entity_tests
  value: "Bosnia and Herzegovina tax residence is entity-based: FBiH uses residence or 183+ days in a calendar year; RS uses permanent residence, 183+ days in a 12-month period, or centre of vital interests; Brcko uses residence/dwelling/183+ day tests."
  source: src-419
  date_verified: 2026-06-09
  confidence: medium-high
  tags: [tax, residence, fbiH, republika-srpska, brcko]
  notes: "First-pass PwC screen; official entity tax-administration confirmation remains useful before filing."

