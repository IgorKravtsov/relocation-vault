- id: claim-thailand-011
  topic: thailand_usd3000_tax_worked_example
  value: "At USD 3,000/month and USD 1 = THB 32.936578, gross income is about THB 98,810/month; applying Thailand's PIT table with only a THB 60,000 personal allowance leaves about THB 86,607/month (USD 2,630) before accountant, VAT, social-security, insurance, visa, and living costs."
  source: src-476
  date_verified: 2026-06-11
  confidence: medium
  tags: [tax, worked-example, fx, dtv, foreign-client-it]
  notes: "PIT rates from src-471 and personal allowance from src-474. A THB 100,000 additional deduction sensitivity would leave about THB 88,691/month (USD 2,693), but the conservative baseline does not assume the deduction class without Thai adviser confirmation."

