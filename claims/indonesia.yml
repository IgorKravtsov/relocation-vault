- id: claim-indonesia-016
  topic: indonesia_healthcare_system_screen
  value: "Indonesia has public Puskesmas/BPJS channels and private hospitals/clinics in Jakarta and Bali; for expat screening, private insurance with evacuation cover is the safe baseline rather than relying on public onboarding before final status is confirmed."
