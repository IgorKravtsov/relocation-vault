- id: claim-indonesia-001
  topic: indonesia_ukrainian_voa_subject
  value: "Indonesia's official VoA / BVK / calling-visa subject-country list includes Ukraina and Polandia; the B1 visit visa on arrival permits a first stay up to 30 days, extendable once to 60 days total."
  source: src-263
  date_verified: 2026-06-05
  confidence: high
  tags: [entry, visa-on-arrival, ukraine, scouting]
  notes: "B1 visitor status is for scouting/tourism; it does not create a long-stay residence path by itself."

- id: claim-indonesia-002
  topic: indonesia_b1_work_restriction
  value: "Foreigners holding stay rights from Indonesia's B1 visit visa on arrival may not sell goods or services or receive compensation, wages, or similar payments from Indonesian persons or corporations."
  source: src-263
  date_verified: 2026-06-05
  confidence: high
  tags: [entry, visitor-status, work-restriction]
  notes: "This supports using B1 only for reconnaissance and not for local-client work."

- id: claim-indonesia-003
  topic: indonesia_e33g_remote_worker_threshold
  value: "Indonesia's E33G remote-worker limited-stay visa requires proof of salary or income of at least US$60,000/year and an employment agreement with a company established outside Indonesia."
  source: src-264
  date_verified: 2026-06-05
  confidence: high
  tags: [remote-worker, income-threshold, foreign-employer, limited-stay]
  notes: "The couple's current roughly US$36,000/year income is below this threshold."

- id: claim-indonesia-004
  topic: indonesia_e33g_duration_fee_process
  value: "Indonesia's E33G remote-worker visa gives a 1-year limited stay, can be extended online, costs Rp7,000,000 in the listed 1-year package, and has a stated processing time of five working days after visa payment."
  source: src-264
  date_verified: 2026-06-05
  confidence: high
  tags: [remote-worker, duration, fees, process, limited-stay]
  notes: "The page also says the limited-stay permit and re-entry permit issue automatically after admission."

- id: claim-indonesia-005
  topic: indonesia_climate_first_pass
  value: "Indonesia is generally hot, humid, and rainy year-round; Jakarta is about 75/87 F in January and 74/90 F in July, Surabaya about 76/90 F in January and 73/88 F in July, Bandung about 68/83 F in January and 65/84 F in July, and Bali/Denpasar about 77/87 F in January and 75/85 F in July."
  source: src-265
  date_verified: 2026-06-05
  confidence: medium
  tags: [climate, temperature, humidity, jakarta, surabaya, bandung, bali]
  notes: "No winter issue, but humidity, rainfall, and flooding/monsoon comfort risks require later city selection. WeatherSpark clearer-sky proxies add about 77 day-equivalent days for Jakarta, 96 for Surabaya, and 39 for Medan."


- id: claim-indonesia-006
  topic: indonesia_tax_residence_scope
  value: "Indonesia treats an individual as tax resident if they reside in Indonesia, are present for more than 183 days in any 12-month period, or are present in a fiscal year and intend to reside; tax residents are generally taxed on worldwide income."
  source: [src-477, src-478]
  date_verified: 2026-06-11
  confidence: medium-high
  tags: [tax, residence, worldwide-income]
  notes: "PwC also reports a conditional first-four-years territorial concession for some skilled foreign tax residents, but this is not assumed for scoring."

- id: claim-indonesia-007
  topic: indonesia_resident_pit_rates_2026
  value: "Indonesia's resident individual PIT brackets are 5% up to IDR 60m, 15% above IDR 60m to IDR 250m, 25% above IDR 250m to IDR 500m, 30% above IDR 500m to IDR 5b, and 35% above IDR 5b."
  source: src-477
  date_verified: 2026-06-11
  confidence: medium-high
  tags: [tax, pit, brackets, 2026]
  notes: "Non-resident Indonesian-source income is generally subject to 20% WHT, subject to treaty concessions."

- id: claim-indonesia-008
  topic: indonesia_personal_relief_marriage
  value: "Indonesia's basic annual personal relief is IDR 54m, with IDR 4.5m spouse relief and IDR 4.5m per dependant up to three; relief is not available to non-residents."
  source: src-479
  date_verified: 2026-06-11
  confidence: medium-high
  tags: [tax, deductions, marriage, dependants]
  notes: "At the couple's income level, spouse relief changes tax only modestly; immigration/dependent planning remains the larger marriage issue."

- id: claim-indonesia-009
  topic: indonesia_vat_bpjs_context
  value: "PwC reports effective 11% VAT for most taxable goods/services, 12% for certain luxury goods, zero-rating for exported services subject to Ministry of Finance limits including some IT services, and BPJS/housing-savings rules that may touch expatriate independent workers but need route-specific confirmation."
  source: src-480
  date_verified: 2026-06-11
  confidence: medium-high
  tags: [tax, vat, bpjs, exported-services, social-security]
  notes: "Exact E33G freelancer VAT/BPJS/housing-savings treatment remains a verification item."

- id: claim-indonesia-010
  topic: indonesia_usd3000_tax_worked_example
  value: "At USD 3,000/month and USD 1 = IDR 17,916.976082, gross is about IDR 53.75m/month; conservative resident PIT-only modelling with IDR 54m personal relief leaves about IDR 43.64m/month, or about USD 2,436, before accountant, VAT, BPJS/housing-savings, insurance, visa, and living costs."
  source: [src-477, src-479, src-481]
  date_verified: 2026-06-11
  confidence: medium
  tags: [tax, worked-example, fx, indonesia, remote-it]
  notes: "This is a screening calculation, not filing advice, and it does not solve the E33G USD 60,000/year immigration gate."

