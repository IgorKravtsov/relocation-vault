- id: claim-indonesia-021
  topic: indonesia_partner_single_income_fit
  value: "For the student partner, Indonesia should be planned with marriage/spouse dependency or independent status rather than assumed unmarried-partner coverage; one-income monthly costs can fit on paper, but E33G's US$60,000/year income gate, private insurance, tax/VAT/BPJS advice, and future school costs keep Indonesia bridge-only at the couple's current income."
  source: [src-263, src-264, src-590, src-591, src-592, src-593, src-594, src-728, src-730, src-731, src-799]
  date_verified: 2026-06-24
