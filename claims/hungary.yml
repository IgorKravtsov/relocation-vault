- id: claim-hungary-016
  topic: usd_3000_tax_stress_test
  value: "At 1 USD = HUF 306.3855, USD 3,000/month is about HUF 919,157/month. A conservative actual-base stress test with 90% PIT base, 15% PIT, 18.5% social-security contribution, and 13% social tax leaves about HUF 534,490/month (~USD 1,745); a minimum-base sensitivity leaves about HUF 671,448/month (~USD 2,192)."
  source: src-336
  date_verified: 2026-06-07
  confidence: medium
  tags: [tax-calculation, self-employed, remote-it, hungary]
  notes: "Not a passed-section result: exact individual-entrepreneur registration, contribution bases, VAT, and immigration-status compatibility need adviser / authority verification."


