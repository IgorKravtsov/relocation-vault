- id: claim-argentina-002
  topic: digital_nomad_transitory_residence
  value: "Argentina's official digital-nomad route is a transitory residence under Law 25.871 Art. 24(h) / DNM Disposition 758/2022 for visa-exempt nationals serving clients or entities abroad, granted for up to 180 days and extendable."
  source: src-235
  date_verified: 2026-06-04
  confidence: high
  tags: [digital-nomad, transitory-residence, remote-work]
  notes: "The in-country route is semi-presential / in person and needs passport, Argentine criminal record, address evidence, regular entry, signed request, CV, and proof of remote activity/income/reference."

- id: claim-argentina-003
  topic: digital_nomad_electronic_entry
  value: "Argentina's electronic entry process for digital nomads requires a request note, CV, passport JPG, live photo JPG, and proof of remote work activity/income/reference; approved applicants receive email authorization to show at border control."
  source: src-236
  date_verified: 2026-06-04
  confidence: high
  tags: [digital-nomad, electronic-entry, checklist]
  notes: "This supports pre-arrival DN planning but does not by itself establish a durable residence route."

- id: claim-argentina-004
  topic: rentista_route_excludes_personal_work
  value: "Argentina's rentista temporary-residence category requires external income from assets and explicitly excludes remuneration obtained by personal work; the rent amount must be at least five Argentine minimum wages."
  source: src-239
  date_verified: 2026-06-04
  confidence: high
  tags: [rentista, temporary-residence, income-threshold, route-fit]
  notes: "This makes rentista a poor default fit for a foreign-client IT freelancer unless passive assets/income are documented separately."

- id: claim-argentina-005
  topic: citizenship_two_year_continuous_legal_residence
  value: "Updated Law 346 Art. 2 allows foreigners over 18 to naturalize after continuous and legal residence in Argentina during the two years before application, and defines continuous residence as staying in Argentina throughout that period without any trip abroad."
  source: src-240
  date_verified: 2026-06-04
  confidence: high
  tags: [citizenship, naturalization, two-years, continuous-residence]
  notes: "The 2025 no-exit rule is a major practical constraint for planning."

- id: claim-argentina-006
  topic: climate_clearer_sky_and_temperature_baseline
  value: "WeatherSpark clearer-sky percentages convert to about 225 clearer-sky day-equivalents for Buenos Aires, 269 for San Miguel de Tucuman as an inland northern proxy, and 265 for Mendoza; Climate to Travel gives practical January/July temperature and rain comfort baselines for Buenos Aires, Cordoba, and Mendoza."
  source: src-242
  date_verified: 2026-06-04
  confidence: medium
  tags: [climate, clear-sky, temperature, buenos-aires, cordoba, mendoza]
  notes: "Clearer-sky values are broader WeatherSpark proxies, not official sunny-day counts. Cordoba climate temperatures/rainfall are anchored by src-241; WeatherSpark country table lacks Cordoba, so San Miguel de Tucuman is not used as a city-specific Cordoba claim."


- id: claim-argentina-007
  topic: argentina_tax_residence_worldwide_income
  value: "Argentine tax residents are taxable on worldwide income with foreign-tax-credit relief; foreign individuals residing in Argentina for reasons other than work become tax resident after more than 12 months, from the 13th month of presence."
  source: src-457
  date_verified: 2026-06-10
  confidence: medium-high
  tags: [tax-residence, worldwide-income, argentina]
  notes: "DN bridge use and durable residence may differ; adviser confirmation needed for the couple's exact file."

- id: claim-argentina-008
  topic: argentina_self_employed_pit_scale
  value: "PwC's self-employed PIT table applicable as of 30 Dec 2025 ranges from 5% on the first ARS 1,749,902 of annual taxable income to 35% above ARS 53,153,257; 2026 thresholds are adjusted semiannually by CPI and the top rate remains 35%."
  source: src-456
  date_verified: 2026-06-10
  confidence: medium-high
  tags: [pit, self-employed, argentina, tax-rates]
  notes: "Used as a screening table only because second-semester 2026 thresholds will update with inflation."

- id: claim-argentina-009
  topic: argentina_vat_and_gross_income_tax_risk
  value: "Argentina's VAT is generally 21% and applies to most services and self-employed activity; provincial gross income tax generally ranges from 0.5% to 6%, with CABA's 2026 general services rate at 3% but a professional-not-company exemption noted by PwC."
  source: src-459
  date_verified: 2026-06-10
  confidence: medium-high
  tags: [vat, gross-income-tax, ingresos-brutos, argentina]
  notes: "Exact export-service treatment for an Argentina-located IT contractor invoicing foreign clients remains unverified."

- id: claim-argentina-010
  topic: argentina_spouse_separate_taxation_and_filing
  value: "Each spouse's earnings from employment and business activities are assessed separately and individually; self-employed workers must register with the tax authorities, file an annual PIT return in June, and make advance payments."
  source: src-460
  date_verified: 2026-06-10
  confidence: medium-high
  tags: [marriage, filing, self-employed, argentina]
  notes: "Marriage may help immigration/dependent planning but does not create a joint-return tax shelter in this first-pass model."

- id: claim-argentina-011
  topic: argentina_usd3000_tax_screen
  value: "At USD 1 = ARS 1,446.1668, USD 3,000/month is about ARS 4,338,500/month; applying the captured self-employed PIT table with no optimisation gives PIT-only net of about ARS 3,296,882/month, roughly USD 2,280."
  source: src-461
  date_verified: 2026-06-10
  confidence: medium
  tags: [worked-example, fx, pit, argentina]
