- id: claim-albania-008
  topic: albania_tax_residence_worldwide_income
  value: "Albanian tax residents are taxed on worldwide income; residence can arise from a permanent home in Albania or more than 183 days of stay in a calendar year."
  source: src-408
  date_verified: 2026-06-09
  confidence: medium-high
  tags: [tax-residence, worldwide-income, albania]
  notes: "Use this as the baseline for a full-time relocation; do not assume foreign-client income is outside the Albanian tax base after residence begins."

