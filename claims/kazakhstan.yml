- id: claim-kazakhstan-005
  topic: kazakhstan_climate_first_pass
  value: "Kazakhstan is markedly continental: Astana is about -4/12 F low/high in January and 57/79 F in July, Almaty about 13/29 F in January and 61/85 F in July, and Shymkent about 23/38 F in January and 65/92 F in July; WeatherSpark clearer-sky proxies are about 163, 220, and 235 day-equivalent days/year respectively."
  source: src-273
  date_verified: 2026-06-05
  confidence: medium
  tags: [climate, astana, almaty, shymkent, clearer-sky-proxy]
  notes: "Climate to Travel source src-272 supports the broader continental-climate and winter-comfort caveats."
