- id: claim-kazakhstan-002
  topic: kazakhstan_arrival_notification_and_trp
  value: "The receiving party must notify migration authorities within 3 working days of a foreign citizen's arrival; TRP is issued to CIS citizens for up to 1 year for labor activity, entrepreneurial activity as a business immigrant, family reunion, study, medical treatment, or missionary activity."
  source: src-268
  date_verified: 2026-06-05
  confidence: high
  tags: [arrival-notification, trp, cis, temporary-residence]
  notes: "The source also states that IIN is needed for bank accounts, salary, digital signatures, public services, and payments."

- id: claim-kazakhstan-003
  topic: kazakhstan_neo_nomad_secondary_baseline
  value: "A reputable-secondary first pass describes Kazakhstan's Neo Nomad route as a remote-work visa with a US$3,000/month income threshold, health insurance, clean criminal-record certificate, and foreign-client/foreign-employer work."
  source: src-269
  date_verified: 2026-06-05
  confidence: medium
  tags: [remote-worker, digital-nomad, income-threshold, verification-required]
  notes: "Official-primary checklist / visa category / dependent mechanics were not captured in this iteration, so this cannot yet be used as a high-confidence settlement route."

- id: claim-kazakhstan-004
  topic: kazakhstan_pr_citizenship_unclear
  value: "Kazakhstan migration and citizenship laws define residence-permit and citizenship concepts, and citizenship law says a Kazakh citizen is not recognized as a citizen of another country; this pass did not capture the exact PR-counting and ordinary naturalization mechanics for TRP / Neo Nomad / foreign-client IT."
  source: src-270
  date_verified: 2026-06-05
  confidence: medium
  tags: [permanent-residence, citizenship, dual-citizenship, verification-required]
