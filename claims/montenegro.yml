- id: claim-montenegro-014
  topic: social_security_baseline_gap
  value: "PwC Montenegro states that mandatory salary SSC includes 10% employee pension/disability plus 0.5% employee unemployment and 0.5% employer unemployment, and that SSC are also levied on other personal income under the SSC Law; the exact self-employed contribution base/rate was not captured."
