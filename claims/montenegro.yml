- id: claim-montenegro-015
  topic: tax_filing_vat_baseline
  value: "PwC Montenegro states that the tax year is the calendar year, annual returns are generally due by end-April for the previous year's income, entrepreneurial-income tax is payable in 12 monthly instalments, and the standard VAT rate is 21%."
