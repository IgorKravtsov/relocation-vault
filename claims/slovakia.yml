  topic: szco_social_insurance_minimum_2026
  value: "Slovakia's Social Insurance Agency 2026 table gives the mandatory SZCO minimum assessment base as EUR 914.40/month and minimum social-insurance contribution as EUR 303.11/month, with a EUR 16,764/month maximum assessment base."
