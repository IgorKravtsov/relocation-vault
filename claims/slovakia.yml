- id: claim-slovakia-008
  topic: business_residence_real_business_scrutiny
  value: "Slovakia's Ministry of Economy states that from 01 July 2025 business-purpose temporary-residence applications are accepted exclusively at Slovak diplomatic missions abroad, require a mandatory business plan, and are evaluated for feasibility, sustainability, and economic contribution; extensions examine real business activity, tax compliance, employees, and contribution to reducing unemployment."
  source: src-108
  date_verified: 2026-05-29
  confidence: high
  tags: [business-residence, business-plan, self-employed, slovakia]
