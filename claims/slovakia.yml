- id: claim-slovakia-013
  topic: szco_health_insurance_minimum_2026
  value: "Vseobecna zdravotna poistovna and Dovera publish the 2026 SZCO minimum public health-insurance advance as EUR 121.92/month for a person without disability, based on a EUR 762.00 minimum assessment base and 16% rate."
  source: src-341
