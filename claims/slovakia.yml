- id: claim-slovakia-002
  topic: self_employed_business_residence_route
  value: "A non-EU self-employed worker in Slovakia must obtain temporary residence for the purpose of business and satisfy Slovak-law business conditions such as a trade licence; trade-licence applicants without EU/OECD permanent residence must also apply for Commercial Register entry."
  source: src-101
  date_verified: 2026-05-29
  confidence: medium-high
  tags: [self-employed, business-residence, temporary-residence, slovakia]
  notes: "EU Immigration Portal is official-secondary; official-primary Slovak checklist still queued for verification."

- id: claim-slovakia-003
  topic: business_residence_documents_and_fees
  value: "Business-residence application evidence includes Slovak application form, passport, photos, business plan or business authorization, criminal-record statements, personal and business financial coverage, accommodation evidence, certified Slovak translations/authentication for foreign official documents, and fees of EUR 232 at Foreign Police or EUR 240 at embassy plus EUR 4.50 residence-card fee."
  source: src-101
  date_verified: 2026-05-29
  confidence: medium-high
  tags: [business-residence, documents, fees, apostille, slovakia]
