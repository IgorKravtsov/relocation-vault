  value: "PwC Slovakia states that the standard VAT rate is 23%; Slovak-established taxable persons become VAT payers if annual turnover exceeds EUR 50,000 in the current calendar year, generally from the next calendar year, while exceeding EUR 62,500 triggers immediate registration."
  source: src-342
