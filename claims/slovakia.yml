- id: claim-slovakia-015
  topic: usd3000_slovakia_szco_tax_stress_test
  value: "At the ECB 2026-06-05 rate of EUR 1 = USD 1.1640, USD 3,000/month is about EUR 2,577/month. Under a possible non-VAT SZCO model with 60% lump-sum expenses, 2026 minimum social insurance, and 2026 minimum health insurance, first-pass net is about EUR 2,050-2,147/month (about USD 2,386-2,499) before accountant/VAT/immigration costs."
