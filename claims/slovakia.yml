  value: "IOM Slovakia states that long-term residence can be granted to a foreign national who has legally resided in Slovakia for an uninterrupted period of at least 5 years directly before application."
  source: src-103
  date_verified: 2026-05-29
  confidence: medium-high
  tags: [long-term-residence, permanent-residence, slovakia]
