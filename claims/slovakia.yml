- id: claim-slovakia-010
  topic: tax_residence_and_pit_baseline
  value: "PwC Slovakia states that Slovak tax residents are taxed on worldwide income; residence can arise through permanent residence, 183+ days of presence, accommodation plus intent to stay permanently, or treaty status. At the couple's current income, the first-pass PIT model stays in the 19% band."
  source: src-338
  date_verified: 2026-06-07
  confidence: medium-high
  tags: [tax-residence, pit, slovakia, freelancer]
