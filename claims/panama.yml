- id: claim-panama-001
  topic: remote_worker_income_threshold
  value: "Panama's short-stay remote-worker visa requires foreign-source income of at least B/.36,000 per year, or B/.3,000 per month in the employer-letter checklist."
  source: src-199
  date_verified: 2026-06-02
  confidence: high
  tags: [remote-worker, digital-nomad, income-threshold]
  notes: "The couple's approximate USD 3,000/month gross sits exactly at the threshold, so a buffer is prudent."

- id: claim-panama-002
  topic: remote_worker_duration
  value: "Panama's remote-worker visa is valid for 9 months and may be renewed once for the same period."
  source: src-199
  date_verified: 2026-06-02
  confidence: high
  tags: [remote-worker, duration, bridge]
  notes: "This is a bridge route, not captured as permanent residence."

- id: claim-panama-003
  topic: remote_worker_rights
  value: "Once granted, the remote-worker visa allows remote work from Panama without an additional state work or residence permit, provided the work effects and income source are abroad."
  source: src-199
  date_verified: 2026-06-02
  confidence: high
  tags: [remote-worker, work-rights, foreign-source]
  notes: "The checklist also requires a sworn declaration not to accept local work/services/business in Panama."

