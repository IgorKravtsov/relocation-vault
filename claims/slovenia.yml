- id: claim-slovenia-001
  topic: temporary_protection_procedure_and_rights
  value: "Slovenia's government states that Ukrainians and qualifying groups who left Ukraine due to the Russian military invasion may apply for temporary protection; the process starts with police registration, then an administrative-unit application within three working days, and an approved temporary-protection card is valid as a temporary residence permit in Slovenia."
  source: src-110
  date_verified: 2026-05-29
  confidence: high
  tags: [temporary-protection, ukraine, procedure, slovenia]
  notes: "EU-level protection horizon to 04 March 2027 is supported by shared source src-002."

- id: claim-slovenia-002
  topic: post_temporary_protection_filing_window
  value: "After temporary protection ends, Slovenia allows a person to apply within 10 days to the competent authority for a temporary residence permit for any statutory purpose; if filed on time, a certificate is valid as residence until final decision, and for timely single-permit applicants who were employed/working/self-employed at TP termination the certificate can allow residence and work until decision."
  source: src-110
  date_verified: 2026-05-29
  confidence: high
  tags: [temporary-protection, post-2027, transition-window, slovenia]
  notes: "This is a filing-window/safety-valve baseline, not automatic conversion into a specific long-term status."

- id: claim-slovenia-003
  topic: digital_nomad_residence_route
  value: "Slovenia introduced a temporary residence permit for digital nomads on 21 November 2025 for non-EU/EEA foreigners working remotely via ICT for a foreign employer/client or as self-employed abroad; it may be issued for up to one year, cannot be extended, and requires monthly funds of at least twice Slovenia's average monthly net salary."
  source: src-111
  date_verified: 2026-05-29
  confidence: high
  tags: [digital-nomad, remote-work, income-threshold, slovenia]
  notes: "Current numeric threshold from the latest Official Gazette salary value still needs calculation before budget scoring."

- id: claim-slovenia-004
  topic: self_employed_single_permit_baseline
  value: "EU Immigration Portal guidance says a person who wants to work as self-employed in Slovenia must obtain a single permit and generally must already have resided in Slovenia on a valid residence permit for at least one year before self-employment, except for a business-register professional-activity category."
  source: src-112
  date_verified: 2026-05-29
  confidence: medium-high
  tags: [self-employed, single-permit, temporary-residence, slovenia]
  notes: "Needs a later tax/business pass for practical freelancer fit."

- id: claim-slovenia-005
  topic: family_reunification_scope
  value: "Slovenia family-reunification guidance covers the spouse, partner in a civil partnership or civil union, or partner with whom the sponsor is in a long-term relationship, plus listed children/dependent relatives; digital nomads may reunite with family members immediately under the Ministry announcement."
  source: src-113
  date_verified: 2026-05-29
  confidence: medium-high
  tags: [family-reunification, partner, digital-nomad, slovenia]
  notes: "Exact evidence standard for an unmarried long-term partner still needs application-checklist verification."

- id: claim-slovenia-006
  topic: permanent_residence_period
  value: "EU Immigration Portal guidance states that after five continuous years of legal residence on the basis of temporary residence in Slovenia, a person can apply for a permanent residence permit, subject to absence and continuity rules."
  source: src-112
  date_verified: 2026-05-29
  confidence: medium-high
  tags: [permanent-residence, long-term-residence, slovenia]
  notes: "Whether DN and TP time count fully should be verified before scoring."

- id: claim-slovenia-007
  topic: citizenship_residence_period
  value: "Slovenia's government citizenship page states that ordinary naturalisation requires living in Slovenia for at least 10 years, including a continuous period of five years' residence prior to application, plus other statutory conditions."
  source: src-114
  date_verified: 2026-05-29
  confidence: high
  tags: [citizenship, naturalization, slovenia]
  notes: "Detailed language, income, release/dual-citizenship and document conditions need a later citizenship pass."

- id: claim-slovenia-008
  topic: climate_first_pass
  value: "Ljubljana, Maribor, and Portorož show a split Slovenia climate profile: inland January means around 0.5-1.2°C and July means around 21.4-21.9°C with about 1,955-2,045 annual sunshine hours, while coastal Portorož has a January mean of 5.3°C, July mean of 23.4°C, and about 2,415 sunshine hours; direct sunny-day counts are not captured."
  source: src-115
  date_verified: 2026-05-29
  confidence: medium
  tags: [climate, sunshine-hours, slovenia]
  notes: "Also relies on src-116 and src-117 for Maribor and Portorož; keep section 5.2 partial until direct sunny/clear-day counts are verified."

- id: claim-slovenia-009
  topic: tax_residence_and_pit_rates
  value: "Slovenian PIT residents are taxed on worldwide income; tax residence can arise from formal residence ties, habitual abode / centre of interests, or presence over 183 days in a taxable year. PwC's January 2026 table gives progressive PIT bands of 16%, 26%, 33%, 39%, and 50%, with the first two annual taxable-base bands ending at EUR 9,210.26 and EUR 27,089."
  source: src-344
  date_verified: 2026-06-07
  confidence: medium-high
  tags: [tax-residence, pit, worldwide-income, slovenia]
  notes: "Also relies on src-346 for the general allowance used in the simplified worked example."

- id: claim-slovenia-010
  topic: self_employed_social_contributions
  value: "PwC states that self-employed persons in Slovenia must pay income tax and social-security contributions themselves; the captured contribution table totals 22.10% employee-side and 16.10% employer-side rates, or 38.20% in aggregate, across pension/disability, health, unemployment, injury-at-work, and parental-insurance components."
  source: src-345
  date_verified: 2026-06-07
  confidence: medium-high
  tags: [self-employed, social-contributions, slovenia]
  notes: "Used only as a conservative gross-rate stress test; exact Slovenian s.p. contribution base for the couple's file remains unverified."

- id: claim-slovenia-011
  topic: tax_filing_and_vat_baseline
  value: "Slovenia's tax year is the calendar year; business-activity tax returns should be submitted by 31 March for the previous calendar year. The standard VAT rate is 22%, the VAT registration threshold is reported by PwC as EUR 60,000 from 1 January 2025, and EU B2B reverse-charge services can require VAT return and recapitulative-statement handling."
  source: src-346
  date_verified: 2026-06-07
  confidence: medium-high
  tags: [tax-administration, vat, reverse-charge, slovenia]
  notes: "VAT details also rely on src-347; exact foreign-client IT place-of-supply / VAT ID treatment remains verification-required."

- id: claim-slovenia-012
  topic: usd_eur_fx_for_tax_example
  value: "ECB's run-date reference rate was EUR 1 = USD 1.1640, so USD 3,000/month converts to about EUR 2,577/month for the Slovenia section 5.3 worked example."
  source: src-348
  date_verified: 2026-06-07
  confidence: high
  tags: [fx, tax-example, slovenia]
  notes: "Rate date in ECB feed was 2026-06-05; accessed during run-070 on 2026-06-07."

- id: claim-slovenia-013
  topic: conservative_tax_net_estimate
  value: "A conservative ordinary self-employed stress test at USD 3,000/month (about EUR 30,928/year) applies 38.2% social contributions to gross and progressive PIT after a EUR 5,000 allowance, leaving about EUR 1,364/month or USD 1,587/month before accountant, VAT, health-insurance edge cases, and immigration costs."
  source: src-344
  date_verified: 2026-06-07
  confidence: medium
  tags: [tax-example, self-employed, net-income, slovenia]
  notes: "Also relies on src-345, src-346, and src-348. This is not a passed DoD result because normirani s.p., exact contribution bases, VAT/reverse-charge, and immigration-status fit are unverified."

- id: claim-slovenia-014
  topic: national_cost_of_living_screen
  value: "Livingcost screens Slovenia nationally at about USD 1,515/month for one person with rent and USD 3,570/month for a family-of-four proxy; one-person components include USD 663 without rent, USD 853 rent/utilities, USD 469 food, USD 56.70 transport, utilities around USD 183, and internet around USD 36.10."
  source: src-521
  date_verified: 2026-06-12
  confidence: medium
  tags: [cost-of-living, screening, slovenia]
  notes: "Commercial first-pass screen; not a live household budget quote."

